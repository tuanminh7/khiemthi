<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ config.APP_TITLE }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container nav-shell">
            <a class="brand" href="{{ url_for('main.index') }}" aria-label="Trang chủ Thư Viện Sách Nói AI">
                <span aria-hidden="true">📚</span>
                Thư Viện Sách Nói AI
            </a>
            <nav class="nav-links" aria-label="Menu chính">
                <a href="{{ url_for('main.index') }}">Thư viện</a>
                <a href="{{ url_for('main.admin_books') }}">Quản trị</a>
            </nav>
        </div>
    </header>

    <main class="container page-shell" id="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-stack" aria-label="Thông báo hệ thống">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}" role="alert">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
